spring:
  application:
    name: backend
  datasource:
    url: jdbc:mariadb://localhost:3306/shopping_mall_db
    username: shopping_mall_user
    password: shopping_mall_pass
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  upload:
    dir: uploads/products
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
    name: ${ADMIN_NAME}
    email: ${ADMIN_EMAIL}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
